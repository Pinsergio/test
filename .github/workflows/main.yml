name: CI/CD Pipeline (AWS + Docker + ECS)

on:
  push:
    branches: [ master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # DEBUG: Grundläggande miljöinfo
      - name: Debug environment
        run: |
          echo "=== PWD ==="
          pwd
          echo "=== FILES ==="
          ls -la
          echo "=== NODE VERSION ==="
          node -v || echo "Node saknas"
          echo "=== NPM VERSION ==="
          npm -v || echo "NPM saknas"
          echo "=== DOCKER VERSION ==="
          docker --version || echo "Docker saknas"
          echo "=== AWS CLI VERSION ==="
          aws --version || echo "AWS CLI saknas"
          echo "=== ENV VARS (utan secrets) ==="
          env | grep -v "SECRET" | grep -v "TOKEN" || true

      # 2. Cache node_modules
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Run tests
      - name: Run tests
        run: npm test

      # 5. Build project
      - name: Build project
        run: npm run build

      # 6. Configure AWS credentials (OIDC)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials
